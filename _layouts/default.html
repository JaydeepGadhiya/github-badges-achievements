<!DOCTYPE html>
<html lang="en" data-theme="arcade" class="no-js">
<head>
  <script>document.documentElement.classList.remove('no-js');</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ '/assets/banner.svg' | relative_url }}">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="nav" aria-label="Primary">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark" aria-hidden="true">🏆</span>
        <span class="brand-text">Achievements<span class="brand-accent">Guide</span></span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}#badges">Badges</a>
        <a class="nav-keep" href="{{ '/guides/' | relative_url }}">Guides</a>
        <a href="{{ '/' | relative_url }}#speedrun">Speedrun</a>
        <a class="nav-cta" href="https://github.com/JaydeepGadhiya/github-badges-achievements" target="_blank" rel="noopener">
          <span aria-hidden="true">★</span> GitHub
        </a>
      </div>
    </nav>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-title"><span aria-hidden="true">🏆</span> GitHub Achievements Guide</p>
      <p class="footer-sub">Unlock every profile badge — step by step.</p>
      <p class="footer-links">
        <a href="{{ '/guides/' | relative_url }}">Guides</a> ·
        <a href="https://github.com/JaydeepGadhiya/github-badges-achievements">Repo</a> ·
        <a href="https://github.com/JaydeepGadhiya/github-badges-achievements/blob/main/LICENSE">MIT License</a>
      </p>
      <p class="footer-fine">Badge art © GitHub. Unofficial community guide, not affiliated with GitHub, Inc.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
